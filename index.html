<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter Leader Certificate</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628; --navy-mid: #112240;
    --gold: #c9a84c; --gold-light: #e8cc7a;
    --white: #ffffff; --text: #e8edf5;
    --muted: #7a8ba8; --border: rgba(201,168,76,0.25);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--navy) !important; color: var(--text) !important;
    font-family: 'Lato', sans-serif !important; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 40px 20px 80px;
  }
  header { text-align:center; margin-bottom:44px; }
  .logo-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:6px; }
  .logo-icon {
    width:40px; height:40px; border-radius:10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  h1 {
    font-family:'Cinzel',serif !important; font-size:28px; font-weight:700;
    color: var(--gold-light) !important; letter-spacing:0.04em;
  }
  .subtitle { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; }
  .card {
    background: var(--navy-mid) !important; border:1px solid var(--border);
    border-radius: var(--radius); padding:32px 36px; width:100%; max-width:520px;
  }
  .field-label {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.1em; color:var(--muted); margin-bottom:8px;
  }
  input[type=text] {
    width:100%; padding:13px 16px; background:rgba(10,22,40,0.7);
    border:1.5px solid rgba(201,168,76,0.25); border-radius:10px;
    color:var(--white); font-size:16px; outline:none; margin-bottom:20px;
  }
  .gen-btn {
    width:100%; padding:15px;
    background: #4a5568; /* Default safe gray when locked */
    color: #a0aec0; border:none; border-radius:10px;
    font-family:'Cinzel',serif; font-size:13px; font-weight:700;
    letter-spacing:0.08em; cursor: not-allowed;
  }
  /* When the user types a name, this class changes styling and activates actions */
  .gen-btn.active { 
    background: linear-gradient(135deg,var(--gold),var(--gold-light)) !important;
    color: var(--navy) !important;
    cursor: pointer !important;
  }
  #preview-section { display:none; width:100%; max-width:900px; margin-top:32px; }
  .preview-label { font-family:'Cinzel',serif; font-size:12px; color:var(--gold); text-align:center; margin-bottom:14px;}
  #preview-canvas { width:100%; height:auto; border-radius:12px; display:block; }
  .dl-btn {
    display:block; width:100%; max-width:340px; margin:18px auto 0; padding:14px;
    background:var(--navy-mid); border:1.5px solid var(--gold);
    color:var(--gold); border-radius:10px; font-family:'Cinzel',serif;
    font-size:12px; font-weight:700; text-align:center; text-decoration:none;
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">🏅</div>
    <h1>Chapter Leader Certificate</h1>
  </div>
  <p class="subtitle">Official Verification System</p>
</header>

<div class="card">
  <div class="field-label">Recipient Name</div>
  <input type="text" id="name-input" placeholder="Type name to unlock generator..." autocomplete="off">
  <button class="gen-btn" id="generate-btn" disabled>Generate Certificate</button>
</div>

<div id="preview-section">
  <p class="preview-label">Official Live Preview</p>
  <canvas id="preview-canvas"></canvas>
  <a href="#" class="dl-btn" id="download-btn" download="Certificate.png">Download PNG Certificate</a>
</div>

<script>
  const input = document.getElementById('name-input');
  const btn = document.getElementById('generate-btn');

  // Listen to text inputs and unlock button smoothly
  input.addEventListener('input', () => {
    if (input.value.trim().length > 0) {
      btn.className = 'gen-btn active';
      btn.removeAttribute('disabled');
    } else {
      btn.className = 'gen-btn';
      btn.setAttribute('disabled', 'true');
    }
  });

  btn.addEventListener('click', async () => {
    const name = input.value.trim();
    if (!name) return;

    const tmpl = document.getElementById('hidden-template');

    // Prevent rendering glitches by forcing standard typography layout sets
    await document.fonts.load('10px "Cinzel"');
    await document.fonts.ready;

    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');

    // Use default dimensions from the source image blueprint
    const W = tmpl.naturalWidth || 2000;
    const H = tmpl.naturalHeight || 1414;
    canvas.width = W;
    canvas.height = H;

    // Render layout layers 
    ctx.drawImage(tmpl, 0, 0, W, H);

    // Calculate font scale based on resolution metrics
    let baseFontSize = Math.floor(W * 0.052); 
    ctx.font = `700 ${baseFontSize}px "Cinzel"`;
    
    // Safety check to dynamically wrap long name strings safely inside margins
    const maxTextWidth = W * 0.76;
    while (ctx.measureText(name).width > maxTextWidth && baseFontSize > 22) {
      baseFontSize -= 4;
      ctx.font = `700 ${baseFontSize}px "Cinzel"`;
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Vertical alignment position placement
    const targetY = H * 0.52; 

    // Render text shadow and font styling
    ctx.fillStyle = '#c9a84c'; 
    ctx.fillText(name, W / 2, targetY);

    // Make the preview layout wrapper visible
    const preview = document.getElementById('preview-section');
    preview.style.display = 'block';
    preview.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Link the rendering context to the download button
    document.getElementById('download-btn').href = canvas.toDataURL('image/png');
  });
</script>
</body>
</html>
